<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项应用</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #eef4ff;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --success: #10b981;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 42px 16px;
    }

    .todo-card {
      width: 100%;
      max-width: 560px;
      background: var(--card-bg);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(37, 99, 235, 0.14);
      padding: 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .title-box h1 {
      font-size: 28px;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .title-box p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .top-stats {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      text-align: right;
      font-size: 13px;
      color: var(--primary-dark);
      font-weight: bold;
      line-height: 1.7;
    }

    .top-stats span {
      font-size: 18px;
      color: var(--primary);
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .input-area input {
      flex: 1;
      padding: 13px 15px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    .input-area input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
    }

    .input-area button {
      padding: 0 22px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .input-area button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .todo-list {
      list-style: none;
      margin-top: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: 0.25s ease;
    }

    .todo-item:hover {
      background: #f3f7ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.08);
    }

    .blue-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
    }

    .todo-item.completed .blue-dot {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.13);
    }

    .todo-text {
      flex: 1;
      cursor: pointer;
      font-size: 15px;
      color: #374151;
      word-break: break-word;
      transition: 0.2s ease;
    }

    .todo-item.completed .todo-text {
      color: #9ca3af;
      text-decoration: line-through;
    }

    .status-tag {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--primary-dark);
      background: #dbeafe;
      flex-shrink: 0;
    }

    .todo-item.completed .status-tag {
      color: #047857;
      background: #d1fae5;
    }

    .delete-btn {
      border: none;
      background: var(--danger);
      color: #ffffff;
      padding: 7px 11px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: 0.2s ease;
    }

    .delete-btn:hover {
      background: var(--danger-dark);
    }

    .empty-tip {
      display: none;
      text-align: center;
      padding: 24px 0 12px;
      color: #9ca3af;
      font-size: 14px;
    }

    .empty-tip.show {
      display: block;
    }

    .bottom-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .stat-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      padding: 13px 8px;
    }

    .stat-box strong {
      display: block;
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .stat-box span {
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 12px;
      }

      .todo-card {
        padding: 22px 18px;
        border-radius: 18px;
      }

      .card-header {
        flex-direction: column;
      }

      .top-stats {
        width: 100%;
        text-align: left;
      }

      .input-area {
        flex-direction: column;
      }

      .input-area button {
        width: 100%;
        padding: 12px 0;
      }

      .todo-item {
        align-items: flex-start;
        gap: 10px;
      }

      .status-tag {
        display: none;
      }

      .bottom-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="todo-card">

    <div class="card-header">
      <div class="title-box">
        <h1>待办事项</h1>
        <p>点击待办文字可切换完成状态</p>
      </div>

      <div class="top-stats">
        总数：<span id="topTotal">0</span><br>
        未完成：<span id="topPending">0</span>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="请输入新的待办事项..." />
      <button id="addBtn">添加</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <p class="empty-tip" id="emptyTip">暂无待办事项，快添加一个吧！</p>

    <div class="bottom-stats">
      <div class="stat-box">
        <strong id="bottomTotal">0</strong>
        <span>全部事项</span>
      </div>

      <div class="stat-box">
        <strong id="bottomCompleted">0</strong>
        <span>已完成</span>
      </div>

      <div class="stat-box">
        <strong id="bottomPending">0</strong>
        <span>未完成</span>
      </div>
    </div>

  </div>

  <script>
    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const todoList = document.getElementById("todoList");
    const emptyTip = document.getElementById("emptyTip");

    const topTotal = document.getElementById("topTotal");
    const topPending = document.getElementById("topPending");
    const bottomTotal = document.getElementById("bottomTotal");
    const bottomCompleted = document.getElementById("bottomCompleted");
    const bottomPending = document.getElementById("bottomPending");

    let todos = JSON.parse(localStorage.getItem("todos_with_stats")) || [];

    function saveTodos() {
      localStorage.setItem("todos_with_stats", JSON.stringify(todos));
    }

    function updateStats() {
      const total = todos.length;
      const completed = todos.filter(todo => todo.completed).length;
      const pending = total - completed;

      topTotal.textContent = total;
      topPending.textContent = pending;

      bottomTotal.textContent = total;
      bottomCompleted.textContent = completed;
      bottomPending.textContent = pending;
    }

    function renderTodos() {
      todoList.innerHTML = "";

      if (todos.length === 0) {
        emptyTip.classList.add("show");
      } else {
        emptyTip.classList.remove("show");
      }

      todos.forEach(function(todo, index) {
        const li = document.createElement("li");
        li.className = "todo-item";

        if (todo.completed) {
          li.classList.add("completed");
        }

        const dot = document.createElement("span");
        dot.className = "blue-dot";

        const text = document.createElement("span");
        text.className = "todo-text";
        text.textContent = todo.text;

        text.addEventListener("click", function() {
          todos[index].completed = !todos[index].completed;
          saveTodos();
          renderTodos();
        });

        const statusTag = document.createElement("span");
        statusTag.className = "status-tag";
        statusTag.textContent = todo.completed ? "已完成" : "进行中";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "删除";

        deleteBtn.addEventListener("click", function() {
          todos.splice(index, 1);
          saveTodos();
          renderTodos();
        });

        li.appendChild(dot);
        li.appendChild(text);
        li.appendChild(statusTag);
        li.appendChild(deleteBtn);

        todoList.appendChild(li);
      });

      updateStats();
    }

    function addTodo() {
      const text = todoInput.value.trim();

      if (text === "") {
        alert("请输入待办事项内容！");
        return;
      }

      todos.push({
        text: text,
        completed: false
      });

      todoInput.value = "";
      saveTodos();
      renderTodos();
      todoInput.focus();
    }

    addBtn.addEventListener("click", addTodo);

    todoInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        addTodo();
      }
    });

    renderTodos();
  </script>
</body>
</html>
